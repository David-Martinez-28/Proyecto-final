services:
  react:
    build:
      context: ./react-app
    volumes:
      - ./react-app:/app
      - /app/node_modules
    expose:
      - "5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./src:/var/www
    depends_on:
      - php
      - react
    networks:
      - app-network

  php:
    build: ./php
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: demo
      DB_USERNAME: dwes
      DB_PASSWORD: dwes
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dwes
      MYSQL_DATABASE: demo
      MYSQL_USER: dwes
      MYSQL_PASSWORD: dwes
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./src:/app
    entrypoint: ["composer"]
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  db_data: