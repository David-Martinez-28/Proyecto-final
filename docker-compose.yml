services:
  
  react:
    build:
      context: ./react-app
    volumes:
      - ./react-app:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

  
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./src:/var/www
    depends_on:
      - php

  
  php:
    build: ./php
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dwes
      MYSQL_DATABASE: demo
      MYSQL_USER: dwes
      MYSQL_PASSWORD: dwes
    volumes:
      - db_data:/var/lib/mysql

  
  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./src:/app
    entrypoint: ["composer"]

volumes:
  db_data: